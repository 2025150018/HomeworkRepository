<!DOCTYPE html>
<html>
    <head>
        <link rel = "stylesheet" type = "text/css" href = "main.css">
        <meta charset="utf-8">
        <title>로그인</title>
    </head>

    <body>
        <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>
        <p><a href = "login.html">로그인</a>| <u>회원가입</u></p>

        <form autocomplete="on" class="box">
            <div class = "inputline">
                <label for = "name">이름:</label>
                <input type = "text" id = "name" autofocus>
            </div>
            <div class = "inputline">
                <label for = "Date">생일:</label>
                <input type = "date" id = "Date">
            </div>
            <div class = "inputline">
                <label>성별:</label>
                <label><input type = "radio" name = "gender" value = "male">남성</label>
                <label><input type = "radio" name = "gender" value = "female">여성</label>

            </div>
            <div class = "inputline">
                <label for = "grade">학년:</label>
                <input type = "number" min = "1" max = "6" step = 1 id = "grade">
            </div>
            <div class = "inputline">
                <label for = "id">아이디:</label>
                <input type = "text" required id = "id">
            </div>
            <div class = "inputline">
                <label for = "pw">비밀번호:</label>
                <input type = "password" required id = "pw" autocomplete="off">
            </div>
            <div class = "inputline">
                <label for = "email">이메일:</label>
                <input type = "email" placeholder="이메일을 입력해주세요" required id = "email">
            </div>
            <div class = "inputline">
                <label for = "securityQ">보안 질문:</label>
                <select id = "securityQ">
                    <option value="" disabled selected>질문을 선택하세요</option>
                    <option value="1">보안질문1</option>
                    <option value="2">보안질문2</option>
                    <option value="3">보안질문3</option>
                    <option value="4">보안질문4</option>
                    <option value="5">보안질문5</option>
                </select>
            </div>
            <div class = "inputline">
                <label for = "respond">답변:</label>
                <input type = "text" id = "respond">
            </div>
            <input type = "submit" value = "Signup" class = "buttons">
            <input type = "reset" value = "Cancel" class = "buttons">
        </form>
    </body>
</html>
